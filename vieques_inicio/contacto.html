<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vieques, Puerto Rico</title>

    <!-- Normalize -->
    <link rel="stylesheet" href="css/normalize.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/vieques.css">
</head>

<body>

<header class="header no-margin">
    <div class="contenedor">
        <div class="barra">

            <a class="logo" href="index.html">
                <h1 class="logo__nombre no-margin centrar-text">
                    Visita <span class="logo__bold">Vieques</span>
                </h1>
            </a>

            <nav class="navegacion">
                <a href="index.html" class="enlace_nav">Inicio</a>
                <a href="atractivos.html" class="enlace_nav">Atractivos</a>
                <a href="gastronomia.html" class="enlace_nav">Gastronomía</a>
                <a href="historia.html" class="enlace_nav">Historia</a>
                <a href="contacto.html" class="enlace_nav">Contacto</a>
            </nav>

        </div>
    </div>

    <div class="header__text">
        <h2 class="no-margin">La Isla Nena de Puerto Rico</h2>
    </div>
</header>





<main class="contenedor">

    <h3 class="centrar-text no-margin">Contacto</h3>

    <div class="contacto-bg"></div>

    <form class="formulario">

        <div class="campo">
            <input
                class="campo__field"
                type="text"
                placeholder="Nombre"
                id="nombre"
            >
        </div>

        <div class="campo">
            <input
                class="campo__field"
                type="email"
                placeholder="E-mail"
                id="email"
            >
        </div>

        <div class="campo">
            <textarea
                class="campo__field campo__field--textarea"
                placeholder="Mensaje"
                id="mensaje"
            ></textarea>
        </div>

        <div class="campo">
            <input type="submit" value="Enviar" class="boton boton--primario">
        </div>

    </form>

</main>

<footer class="footer">
    <div class="no-padding contenedor">
        <div class="no-padding barra">

            <a class="logo" href="index.html">
                <h1 class="logo__nombre no-margin centrar-text logo__bold">Vieques</h1>
            </a>

            <nav class="navegacion">
                <a href="index.html" class="enlace_nav">Inicio</a>
                <a href="atractivos.html" class="enlace_nav">Atractivos</a>
                <a href="gastronomia.html" class="enlace_nav">Gastronomía</a>
                <a href="historia.html" class="enlace_nav">Historia</a>
                <a href="contacto.html" class="enlace_nav">Contacto</a>
            </nav>

        </div>
    </div>


    <!-- REDES -->

    <ul class="social-menu no-padding">
    <li><a href="https://facebook.com/"><i class="fab fa-facebook"></i></a></li>
    <li><a href="https://twitter.com/"><i class="fab fa-twitter"></i></a></li>
    <li><a href="https://instagram.com/"><i class="fab fa-instagram"></i></a></li>
    <li><a href="https://youtube.com/"><i class="fab fa-youtube"></i></a></li>
</ul>
</footer>

</body>
</html>
